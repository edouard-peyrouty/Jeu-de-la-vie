<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>        
        /* ===== VARIABLES DE COULEURS ===== */
        :root {
            --primary-bg: #E8AABE;
            --purple: #CA3C66;
            --dark-purple: #4f122b;
            --white: #dfced6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--dark-purple);
            line-height: 1.6;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .color-box {
            background-color: rgba(255, 255, 255, 0.3);
            color: var(--dark-purple);
            padding: 20px;
            margin-top: 30px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
        }

        #canvas {
            border-radius: 10px;
            display: block;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        nav {
            width: fit-content;
            border-radius: 20px;
            background-color: rgba(255, 255, 255, 0.5);
            display: flex;
            gap: 10px;
            padding: 10px;
            margin: 10px;
        }

        .nav-btn{   
            display: inline-block;
            padding: 10px 25px;
            background-color: var(--purple);
            color: var(--white);
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px var(--purple);
        }

        .nav-btn:hover {
            background-color: var(--dark-purple);
            color: var(--primary-bg);
            box-shadow: 0 6px 20px var(--dark-purple);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="game-container">
            <section class="color-box">
                <canvas id="canvas"></canvas>
            </section>
                <nav class="controls">
                    <a id="btnPlay" class="nav-btn">Lancer</a>
                    <a id="btnRandom" class="nav-btn">Aléatoire</a>
                    <a id="btnClear" class="nav-btn">Effacer</a>
                </nav>
        </div>
    </div>

    <script>
        const SIZE = 30;
        const CELL = 10;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = SIZE * CELL;
        canvas.height = SIZE * CELL;

        let grid = newGrid();
        let running = false;
        let intervalId = null;
        let painting = false;

        function newGrid() {
            return Array.from({length: SIZE}, () => new Uint8Array(SIZE));
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    ctx.fillStyle = grid[r][c] ? '#CA3C66' : '#E8AABE';
                    ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
                    ctx.strokeStyle = "#E8AABE";
                    ctx.lineWidth = 2;
                    ctx.strokeRect(c * CELL, r * CELL, CELL, CELL);
                }
            }
        }

        function step() {
            const next = newGrid();
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    let n = 0;
                    for (let i = r-1; i <= r+1; i++)
                        for (let j = c-1; j <= c+1; j++)
                            if ((i !== r || j !== c) && i >= 0 && i < SIZE && j >= 0 && j < SIZE)
                                n += grid[i][j];
                    next[r][c] = grid[r][c] ? (n === 2 || n === 3 ? 1 : 0) : (n === 3 ? 1 : 0);
                }
            }
            grid = next;
            draw();
        }

        function getRC(cx, cy) {
            const rect = canvas.getBoundingClientRect();
            return {
                r: Math.floor((cy - rect.top) / CELL),
                c: Math.floor((cx - rect.left) / CELL)
            };
        }

        function toggleCell(cx, cy) {
            const {r, c} = getRC(cx, cy);
            if (r >= 0 && r < SIZE && c >= 0 && c < SIZE) {
                grid[r][c] = grid[r][c] ? 0 : 1;
                draw();
            }
        }

        function paintCell(cx, cy) {
            const {r, c} = getRC(cx, cy);
            if (r >= 0 && r < SIZE && c >= 0 && c < SIZE) {
                grid[r][c] = 1;
                draw();
            }
        }

        canvas.addEventListener('mousedown', e => { painting = true; toggleCell(e.clientX, e.clientY); });
        canvas.addEventListener('mousemove', e => { if (painting) paintCell(e.clientX, e.clientY); });
        canvas.addEventListener('mouseup', () => painting = false);
        canvas.addEventListener('mouseleave', () => painting = false);

        document.getElementById('btnPlay').addEventListener('click', () => {
            running = !running;
            document.getElementById('btnPlay').textContent = running ? 'Pause' : 'Lancer';
            if (running) intervalId = setInterval(step, 120);
            else clearInterval(intervalId);
        });

        document.getElementById('btnRandom').addEventListener('click', () => {
            grid = newGrid();
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++)
                    grid[r][c] = Math.random() < 0.3 ? 1 : 0;
            draw();
        });

        document.getElementById('btnClear').addEventListener('click', () => {
            if (running) {
                running = false;
                clearInterval(intervalId);
                document.getElementById('btnPlay').textContent = 'Lancer';
            }
            grid = newGrid();
            draw();
        });

        draw();
        document.getElementById('btnRandom').click();
        document.getElementById('btnPlay').click();
    </script>
</body>
</html>
